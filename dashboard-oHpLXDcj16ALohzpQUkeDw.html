<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demand Dashboard — BasepointGrid</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f3;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header .logo-mark {
      width: 26px;
      height: 26px;
      background: #2dd4a0;
      border-radius: 6px;
    }

    header .brand-name {
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    header .subtitle {
      color: #9a9ab0;
      font-size: 13px;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    .page-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .page-subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 24px;
    }

    /* Summary cards */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 32px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 18px 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.1s;
      border: 1.5px solid transparent;
    }

    .card:hover {
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
      transform: translateY(-1px);
    }

    .card.active {
      border-color: #2dd4a0;
    }

    .card .property-name {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 2px;
    }

    .card .property-city {
      font-size: 12px;
      color: #999;
      margin-bottom: 14px;
    }

    .card .metric-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
    }

    .card .metric-label {
      font-size: 12px;
      color: #888;
    }

    .card .metric-value {
      font-size: 14px;
      font-weight: 700;
      color: #1a1a2e;
    }

    .card .demand-pct {
      font-size: 28px;
      font-weight: 800;
      color: #1a7a5e;
    }

    .card .demand-bar-track {
      height: 6px;
      background: #eee;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 4px;
      margin-bottom: 12px;
    }

    .card .demand-bar-fill {
      height: 100%;
      background: #2dd4a0;
      border-radius: 4px;
    }

    .card .response-count {
      font-size: 12px;
      color: #aaa;
      margin-top: 4px;
    }

    /* Detail section */
    .detail-section {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    .detail-header {
      padding: 18px 20px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .detail-header h2 {
      font-size: 17px;
      font-weight: 700;
    }

    .detail-header .detail-meta {
      font-size: 13px;
      color: #999;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      text-align: left;
      padding: 10px 16px;
      background: #fafafa;
      color: #888;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid #eee;
    }

    td {
      padding: 12px 16px;
      border-bottom: 1px solid #f5f5f5;
      color: #1a1a2e;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
    }

    .badge.yes { background: #e8faf4; color: #1a7a5e; }
    .badge.planning { background: #eaf3ff; color: #2563a0; }
    .badge.would_consider { background: #fff7e0; color: #a07000; }
    .badge.no { background: #f2f2f2; color: #999; }

    .badge.definitely { background: #e8faf4; color: #1a7a5e; }
    .badge.probably { background: #eaf3ff; color: #2563a0; }
    .badge.maybe { background: #fff7e0; color: #a07000; }

    .score-pill {
      display: inline-block;
      min-width: 28px;
      text-align: center;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 800;
      background: #1a1a2e;
      color: #fff;
    }

    .empty-state {
      padding: 48px 20px;
      text-align: center;
      color: #999;
      font-size: 14px;
    }

    .loading {
      padding: 48px 20px;
      text-align: center;
      color: #999;
      font-size: 14px;
    }

    .error-state {
      padding: 48px 20px;
      text-align: center;
      color: #c0392b;
      font-size: 14px;
    }

    .timestamp {
      font-size: 11px;
      color: #bbb;
    }

    .refresh-btn {
      background: #1a1a2e;
      color: #fff;
      border: none;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .refresh-btn:hover { background: #2a2a45; }

    .card-links {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #f0f0f0;
    }

    .card-link {
      flex: 1;
      text-align: center;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 11.5px;
      font-weight: 700;
      text-decoration: none;
      display: block;
      transition: opacity 0.15s;
    }

    .card-link:hover { opacity: 0.82; }

    .card-link.survey {
      background: #e8faf4;
      color: #1a7a5e;
      border: 1px solid #c5ead8;
    }

    .card-link.loi {
      background: #1a1a2e;
      color: #2dd4a0;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <div class="logo-mark"></div>
    <span class="brand-name">BasepointGrid</span>
  </div>
  <span class="subtitle">Demand Dashboard</span>
</header>

<main>
  <div class="page-title">Resident Demand</div>
  <div class="page-subtitle">Live survey responses across all properties</div>

  <div class="controls">
    <span class="timestamp" id="lastUpdated"></span>
    <button class="refresh-btn" onclick="loadData()">Refresh</button>
  </div>

  <div id="summaryGrid" class="summary-grid">
    <div class="loading">Loading...</div>
  </div>

  <div class="detail-section">
    <div class="detail-header">
      <h2 id="detailTitle">All responses</h2>
      <span class="detail-meta" id="detailMeta"></span>
    </div>
    <div id="detailTable"></div>
  </div>
</main>

<script>
  // Token is embedded server-side at deploy time via env var reference.
  // Read from URL so it's never hardcoded in this file.
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token') || '';

  let allData = { summary: [], submissions: [] };
  let activeFilter = null; // property_slug or null for "all"

  const EV_LABELS = {
    yes: 'Drives EV',
    planning: 'Planning to buy',
    would_consider: 'Would consider',
    no: 'No / not planning'
  };

  const USE_LABELS = {
    definitely: 'Definitely',
    probably: 'Probably',
    maybe: 'Maybe',
    no: 'Probably not'
  };

  async function loadData() {
    document.getElementById('summaryGrid').innerHTML = '<div class="loading">Loading...</div>';
    document.getElementById('detailTable').innerHTML = '';

    try {
      const res = await fetch(`/api/dashboard?token=${encodeURIComponent(token)}`);
      if (!res.ok) {
        document.getElementById('summaryGrid').innerHTML =
          '<div class="error-state">Could not load data. Check the link or try refreshing.</div>';
        return;
      }
      allData = await res.json();
      renderSummary();
      renderDetail();
      document.getElementById('lastUpdated').textContent =
        'Updated ' + new Date().toLocaleTimeString();
    } catch (e) {
      document.getElementById('summaryGrid').innerHTML =
        '<div class="error-state">Could not load data. Check your connection and try refreshing.</div>';
    }
  }

  function renderSummary() {
    const grid = document.getElementById('summaryGrid');

    if (!allData.summary.length) {
      grid.innerHTML = '<div class="empty-state">No properties found.</div>';
      return;
    }

    grid.innerHTML = allData.summary.map(p => {
      const pct = p.demand_pct || 0;
      const isActive = activeFilter === p.slug;
      return `
        <div class="card ${isActive ? 'active' : ''}" onclick="setFilter('${p.slug}')">
          <div class="property-name">${escapeHtml(p.display_name)}</div>
          <div class="property-city">${escapeHtml(p.city || '')} · ${p.total_units || '?'} units</div>
          <div class="demand-pct">${pct}%</div>
          <div class="demand-bar-track">
            <div class="demand-bar-fill" style="width: ${Math.min(pct, 100)}%"></div>
          </div>
          <div class="metric-row">
            <span class="metric-label">EV owners</span>
            <span class="metric-value">${p.current_ev_owners || 0}</span>
          </div>
          <div class="metric-row">
            <span class="metric-label">Planning to buy</span>
            <span class="metric-value">${p.planning_to_buy || 0}</span>
          </div>
          <div class="response-count">${p.total_responses || 0} response${p.total_responses === 1 ? '' : 's'}</div>
          <div class="card-links" onclick="event.stopPropagation()">
            <a class="card-link survey" href="/survey.html?p=${p.slug}" target="_blank">📋 Survey</a>
            <a class="card-link loi" href="/loi.html?p=${p.slug}" target="_blank">✍️ LOI</a>
          </div>
        </div>
      `;
    }).join('');
  }

  function setFilter(slug) {
    activeFilter = activeFilter === slug ? null : slug;
    renderSummary();
    renderDetail();
  }

  function renderDetail() {
    const title = document.getElementById('detailTitle');
    const meta = document.getElementById('detailMeta');
    const table = document.getElementById('detailTable');

    let rows = allData.submissions;
    if (activeFilter) {
      rows = rows.filter(r => r.property_slug === activeFilter);
      const prop = allData.summary.find(p => p.slug === activeFilter);
      title.textContent = prop ? prop.display_name : activeFilter;
    } else {
      title.textContent = 'All responses';
    }

    meta.textContent = `${rows.length} response${rows.length === 1 ? '' : 's'}`;

    if (!rows.length) {
      table.innerHTML = '<div class="empty-state">No responses yet for this property.</div>';
      return;
    }

    table.innerHTML = `
      <table>
        <thead>
          <tr>
            ${activeFilter ? '' : '<th>Property</th>'}
            <th>Unit</th>
            <th>EV status</th>
            <th>Would use</th>
            <th>Score</th>
            <th>Email</th>
            <th>Submitted</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              ${activeFilter ? '' : `<td>${escapeHtml(propName(r.property_slug))}</td>`}
              <td>${escapeHtml(r.unit_number)}</td>
              <td><span class="badge ${r.ev_status}">${EV_LABELS[r.ev_status] || r.ev_status}</span></td>
              <td><span class="badge ${r.would_use}">${USE_LABELS[r.would_use] || r.would_use}</span></td>
              <td><span class="score-pill">${r.score}</span></td>
              <td>${escapeHtml(r.email)}</td>
              <td>${formatDate(r.created_at)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  function propName(slug) {
    const prop = allData.summary.find(p => p.slug === slug);
    return prop ? prop.display_name : slug;
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  loadData();
</script>

</body>
</html>
