<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BasepointGrid — Business Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:   #0A0E17;
    --teal:   #1D9E75;
    --teal-hi:#24BE8B;
    --muted:  rgba(255,255,255,0.45);
    --dim:    rgba(255,255,255,0.18);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #E8E8E8;
    padding: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 48px;
    -webkit-font-smoothing: antialiased;
  }

  .label {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 12px;
    text-align: center;
  }

  /* CARD BASE */
  .card {
    width: 3.5in;
    height: 2in;
    border-radius: 0.08in;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.22);
    flex-shrink: 0;
  }

  /* ── FRONT ── */
  .front {
    background: var(--navy);
  }

  /* dot grid bg */
  .front::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(29,158,117,0.22) 1px, transparent 1px);
    background-size: 18px 18px;
    opacity: 0.3;
  }

  /* teal accent bar - left edge */
  .front::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--teal);
  }

  .front-inner {
    position: relative;
    z-index: 1;
    height: 100%;
    padding: 0.18in 0.22in 0.18in 0.26in;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  /* Logo row */
  .logo-row {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .logo-wordmark {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: white;
    letter-spacing: -0.2px;
  }

  .logo-wordmark span { color: var(--teal); }

  /* Name block */
  .name-block { }

  .name {
    font-family: 'Syne', sans-serif;
    font-size: 14.5px;
    font-weight: 700;
    color: white;
    letter-spacing: -0.3px;
    line-height: 1;
    margin-bottom: 3px;
  }

  .title {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--teal);
  }

  /* Contact block */
  /* Contact + QR row */
  .bottom-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .contact-block {
    display: flex;
    flex-direction: column;
    gap: 3.5px;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 9px;
    color: var(--muted);
    line-height: 1;
  }

  .contact-item svg { flex-shrink: 0; }
  .contact-item span { color: rgba(255,255,255,0.75); }

  .front-qr {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .front-qr-box {
    background: white;
    border-radius: 4px;
    padding: 3px;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .front-qr-box canvas, .front-qr-box img {
    display: block;
    width: 42px !important;
    height: 42px !important;
  }

  .front-qr-label {
    font-size: 6.5px;
    color: var(--muted);
    text-align: center;
    line-height: 1.4;
    letter-spacing: 0.2px;
  }

  /* ── BACK ── */
  .back {
    background: var(--teal);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  /* subtle grid on back */
  .back::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(0,0,0,0.15) 1px, transparent 1px);
    background-size: 14px 14px;
  }

  /* dark corner accent */
  .back::after {
    content: '';
    position: absolute;
    bottom: -30px; right: -30px;
    width: 120px; height: 120px;
    background: rgba(0,0,0,0.12);
    border-radius: 50%;
  }

  .back-inner {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 0.2in;
    width: 100%;
    height: 100%;
  }

  .back-mark { opacity: 0.9; }

  .back-tagline {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: rgba(0,0,0,0.7);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    text-align: center;
    line-height: 1.6;
  }

  .back-url {
    font-size: 10px;
    font-weight: 500;
    color: rgba(0,0,0,0.45);
    letter-spacing: 0.4px;
  }

  .back-tagline {
    font-family: 'Syne', sans-serif;
    font-size: 9.5px;
    font-weight: 700;
    color: rgba(0,0,0,0.75);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    line-height: 1.55;
  }

  .back-scan {
    font-size: 9px;
    color: rgba(0,0,0,0.5);
    line-height: 1.5;
  }

  .back-url {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: rgba(0,0,0,0.55);
    letter-spacing: 0.3px;
  }
    body {
      background: white;
      padding: 0.25in;
      gap: 0.25in;
    }
    .card { box-shadow: none; border: 0.5px solid #ddd; }
    .label { display: none; }
    /* Force page break between front and back if needed */
    .card-wrap:last-child { page-break-before: always; }
  }
</style>
</head>
<body>

<!-- FRONT -->
<div>
  <div class="label">Front</div>
  <div class="card front">
    <div class="front-inner">

      <!-- Logo -->
      <div class="logo-row">
        <svg width="18" height="18" viewBox="0 0 72 72">
          <circle cx="12" cy="12" r="4.5" fill="rgba(255,255,255,0.22)"/>
          <circle cx="36" cy="12" r="4.5" fill="rgba(255,255,255,0.22)"/>
          <circle cx="60" cy="12" r="4.5" fill="rgba(255,255,255,0.22)"/>
          <circle cx="12" cy="36" r="4.5" fill="rgba(255,255,255,0.22)"/>
          <circle cx="36" cy="36" r="12" fill="#1D9E75"/>
          <circle cx="60" cy="36" r="4.5" fill="rgba(255,255,255,0.22)"/>
          <circle cx="12" cy="60" r="4.5" fill="rgba(255,255,255,0.22)"/>
          <circle cx="36" cy="60" r="4.5" fill="rgba(255,255,255,0.22)"/>
          <circle cx="60" cy="60" r="4.5" fill="rgba(255,255,255,0.22)"/>
        </svg>
        <div class="logo-wordmark">Basepoint<span>Grid</span></div>
      </div>

      <!-- Name -->
      <div class="name-block">
        <div class="name">Devang Jadav</div>
        <div class="title">Principal</div>
      </div>

      <!-- Contact + QR -->
      <div class="bottom-row">
        <div class="contact-block">
          <div class="contact-item">
            <svg width="9" height="9" viewBox="0 0 20 20" fill="none">
              <path d="M3 3h4l2 4-2.5 1.5a11 11 0 005 5L13 11l4 2v4a2 2 0 01-2 2A16 16 0 013 3z" stroke="#1D9E75" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>925-452-7558</span>
          </div>
          <div class="contact-item">
            <svg width="9" height="9" viewBox="0 0 20 20" fill="none">
              <rect x="2" y="4" width="16" height="13" rx="2" stroke="#1D9E75" stroke-width="1.8"/>
              <path d="M2 7l8 5 8-5" stroke="#1D9E75" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <span>devang@basepointgrid.com</span>
          </div>
          <div class="contact-item">
            <svg width="9" height="9" viewBox="0 0 20 20" fill="none">
              <circle cx="10" cy="10" r="8" stroke="#1D9E75" stroke-width="1.8"/>
              <path d="M10 2c0 0-3 3.5-3 8s3 8 3 8M10 2c0 0 3 3.5 3 8s-3 8-3 8M2 10h16" stroke="#1D9E75" stroke-width="1.3"/>
            </svg>
            <span>basepointgrid.com</span>
          </div>
        </div>

        <!-- QR Code -->
        <div class="front-qr">
          <div class="front-qr-box" id="card-qr-front"></div>
          <div class="front-qr-label">Book a free<br>site review</div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- BACK -->
<div>
  <div class="label">Back</div>
  <div class="card back">
    <div class="back-inner">
      <svg class="back-mark" width="48" height="48" viewBox="0 0 72 72">
        <circle cx="12" cy="12" r="5" fill="rgba(0,0,0,0.18)"/>
        <circle cx="36" cy="12" r="5" fill="rgba(0,0,0,0.18)"/>
        <circle cx="60" cy="12" r="5" fill="rgba(0,0,0,0.18)"/>
        <circle cx="12" cy="36" r="5" fill="rgba(0,0,0,0.18)"/>
        <circle cx="36" cy="36" r="14" fill="rgba(0,0,0,0.28)"/>
        <circle cx="60" cy="36" r="5" fill="rgba(0,0,0,0.18)"/>
        <circle cx="12" cy="60" r="5" fill="rgba(0,0,0,0.18)"/>
        <circle cx="36" cy="60" r="5" fill="rgba(0,0,0,0.18)"/>
        <circle cx="60" cy="60" r="5" fill="rgba(0,0,0,0.18)"/>
      </svg>
      <div class="back-tagline">EV Charging Infrastructure<br>for Multifamily Properties</div>
      <div class="back-url">basepointgrid.com</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  new QRCode(document.getElementById("card-qr-front"), {
    text: "https://basepointgrid.com/schedule",
    width: 42,
    height: 42,
    colorDark: "#0A0E17",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.M
  });
</script>
</body>
</html>
